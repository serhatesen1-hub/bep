        const getSchoolDates = () => {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const startYear = currentMonth >= 7 ? currentYear : currentYear - 1;

            let septFirst = new Date(startYear, 8, 1);
            let dayOfWeek = septFirst.getDay();
            let firstMondayOffset = dayOfWeek === 1 ? 0 : dayOfWeek === 0 ? 1 : 8 - dayOfWeek;
            let secondMonday = new Date(startYear, 8, 1 + firstMondayOffset + 7);

            let juneFirst = new Date(startYear + 1, 5, 1);
            let juneDayOfWeek = juneFirst.getDay();
            let firstFridayOffset = juneDayOfWeek === 5 ? 0 : juneDayOfWeek < 5 ? 5 - juneDayOfWeek : 12 - juneDayOfWeek;
            let thirdFriday = new Date(startYear + 1, 5, 1 + firstFridayOffset + 14);

            return { startDate: secondMonday, endDate: thirdFriday };
        };

        const distributeDates = (kdaCount, startDateStr, endDateStr) => {
            if (kdaCount === 0 || !startDateStr || !endDateStr) return [];
            
            let start = new Date(startDateStr);
            let end = new Date(endDateStr);
            
            let workingDays = [];
            let current = new Date(start);
            while (current <= end) {
                let day = current.getDay();
                if (day !== 0 && day !== 6) { // Hafta sonunu dahil etme
                    workingDays.push(new Date(current));
                }
                current.setDate(current.getDate() + 1);
            }
            
            if (workingDays.length === 0) {
                workingDays.push(start);
                workingDays.push(end);
            }

            const dates = [];
            const chunkSize = Math.floor(workingDays.length / kdaCount);
            let remainder = workingDays.length % kdaCount;
            
            let currentIndex = 0;
            for (let i = 0; i < kdaCount; i++) {
                let currentChunk = chunkSize + (i < remainder ? 1 : 0);
                if (currentChunk === 0) currentChunk = 1; 
                
                let startIdx = currentIndex;
                let endIdx = currentIndex + currentChunk - 1;
                
                if (endIdx >= workingDays.length) endIdx = workingDays.length - 1;
                if (i === kdaCount - 1) endIdx = workingDays.length - 1; 
                
                dates.push({
                    start: workingDays[startIdx].toLocaleDateString('tr-TR'),
                    end: workingDays[endIdx].toLocaleDateString('tr-TR')
                });
                
                currentIndex = endIdx + 1;
                if (currentIndex >= workingDays.length) currentIndex = workingDays.length - 1;
            }
            return dates;
        };

        const validateTC = (tc) => {
            if (!/^[1-9]\d{10}$/.test(tc)) return false; 
            const digits = tc.split('').map(Number);
            const oddSum = digits[0] + digits[2] + digits[4] + digits[6] + digits[8];
            const evenSum = digits[1] + digits[3] + digits[5] + digits[7];
            const tenth = ((oddSum * 7) - evenSum) % 10;
            if (tenth !== digits[9]) return false;
            const firstTenSum = digits.slice(0, 10).reduce((a, b) => a + b, 0);
            const eleventh = firstTenSum % 10;
            if (eleventh !== digits[10]) return false;
            return true;
        };

        function exportHTMLToWord(elementId, filename = 'BEP_Dosyasi.docx') {
            const element = document.getElementById(elementId);

            const html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>BEP Dosyası</title>
                    <style>
                        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; font-size: 10pt; font-family: Arial, sans-serif; } 
                        th, td { border: 1px solid black; padding: 6px; text-align: left; vertical-align: top;} 
                        th { background-color: #f1f5f9; font-weight: bold; }
                        h1, h2, h3 { font-family: Arial, sans-serif; text-align: center; } 
                        body { font-family: Arial, sans-serif; }
                        .print-break { page-break-before: always; }
                        .hide-on-print { display: none !important; }
                        
                        /* Word için Özel Bölüm Yönlendirmeleri */
                        @page WordSection1 { size: 595.3pt 841.9pt; margin: 1cm; }
                        div.WordSection1 { page: WordSection1; }
                        @page WordSection2 { size: 841.9pt 595.3pt; mso-page-orientation: landscape; margin: 1cm; }
                        div.WordSection2 { page: WordSection2; }
                    </style>
                </head>
                <body>
                    ${element.innerHTML}
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

                        th { background-color: #f1f5f9; font-weight: bold; }
                    </style>
                </head>
                <body>${element.innerHTML}</body>
                </html>
            `;
            const blob = new Blob(['\ufeff', html], { type: 'application/vnd.ms-excel;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // ==========================================

        const futureDateStr = futureDate.toISOString().split('T')[0];

            birthDate: '', schoolName: '', schoolNo: '', className: '', motherName: '', fatherName: '', 
            motherSurname: '', fatherSurname: '',

            guardian: GUARDIAN_TYPES[0], decision: DECISION_TYPES[0], disability: DISABILITY_TYPES[0],
            supportEduHistory: '', currentSupportEdu: '', devices: '', healthInfo: '', environmentMods: '',
            parentPhone: '', parentAddress: '', parentWorkAddress: '',
            usesSupportRoom: 'Hayır', supportRoomCourses: [], supportRoomHours: 2, supportRoomTeacher: '', 
            familyInfoFrequency: 'Ayda Bir', familyInfoMethod: 'Yüz Yüze Görüşme', familyEducation: 'Hayır',
        };

        const appState = {
            users: [{ username: 'demo@ornek.com', password: 'demo', firstName: 'Örnek', lastName: 'Öğretmen', branch: 'Özel Eğitim Öğretmeni' }],

        function setView(viewName) {
            appState.view = viewName;
            renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });

        // ==========================================
        // 4. OLAY İŞLEYİCİLER
        // ==========================================

        function handleLogin(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const user = appState.users.find(u => u.username === formData.get('identifier') && u.password === formData.get('password'));
            if (user) { appState.currentUser = user; setView('dashboard'); } else { alert('E-posta/Telefon veya şifre hatalı!'); }
        }

        function handleRegister(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const username = formData.get('reg_identifier');
            if (appState.users.find(u => u.username === username)) { alert('Bu e-posta veya telefon zaten kayıtlı.'); return; }
            appState.users.push({ username, password: formData.get('reg_password'), firstName: '', lastName: '', branch: '' });
            alert('Kayıt başarılı! Lütfen giriş yapın.');
            event.target.reset();
        }

        function handleProfileSave(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            appState.currentUser.firstName = formData.get('firstName');
            appState.currentUser.lastName = formData.get('lastName');
            appState.currentUser.branch = formData.get('branch');
            alert('Profil bilgileriniz güncellendi!');
            setView('dashboard');
        }

        function syncFormState() {
            const form = document.getElementById('studentForm');
            if(!form) return;
            const fd = new FormData(form);
            
            appState.currentStudent = {
                ...appState.currentStudent,
                tcNo: fd.get('tcNo') || '', firstName: fd.get('firstName') || '', lastName: fd.get('lastName') || '',
                gender: fd.get('gender') || GENDER_TYPES[0], birthDate: fd.get('birthDate') || '',
                level: fd.get('level') || LEVEL_TYPES[1], schoolName: fd.get('schoolName') || '',
                className: fd.get('className') || '', schoolNo: fd.get('schoolNo') || '',
                decision: fd.get('decision') || DECISION_TYPES[0], disability: fd.get('disability') || DISABILITY_TYPES[0],
                bepStartDate: fd.get('bepStartDate') || todayStr, bepEndDate: fd.get('bepEndDate') || futureDateStr,
                usesSupportRoom: fd.get('usesSupportRoom') || 'Hayır',
                supportRoomHours: parseInt(fd.get('supportRoomHours') || 2), supportRoomTeacher: fd.get('supportRoomTeacher') || '',
                supportEduHistory: fd.get('supportEduHistory') || '', healthInfo: fd.get('healthInfo') || '',
                environmentMods: fd.get('environmentMods') || '',
                motherName: fd.get('motherName') || '', motherSurname: fd.get('motherSurname') || '',
                fatherName: fd.get('fatherName') || '', fatherSurname: fd.get('fatherSurname') || '',
                guardian: fd.get('guardian') || GUARDIAN_TYPES[0], parentPhone: fd.get('parentPhone') || '',
                parentAddress: fd.get('parentAddress') || '',
                familyInfoFrequency: fd.get('familyInfoFrequency') || 'Ayda Bir',
                familyInfoMethod: fd.get('familyInfoMethod') || 'Yüz Yüze Görüşme',
                familyEducation: fd.get('familyEducation') || 'Hayır',
            };
            appState.currentStudent.supportRoomCourses = fd.getAll('supportRoomCourses');
        }

        function handleStudentFormSubmit(event) {
            event.preventDefault();
            syncFormState(); 

            appState.formError = '';
            if (!validateTC(appState.currentStudent.tcNo)) {
                appState.formError = "Girdiğiniz TC Kimlik Numarası sistem tarafından doğrulanamadı. Lütfen 11 haneli ve doğru bir TC numarası girdiğinizden emin olunuz.";
                renderApp(); 
                return;
            }
            
            if(appState.selectedCourses.length === 0){
                appState.selectedCourses = [];
                appState.evaluations = {};
                appState.selectedBEPGoals = {};
            }
            setView('selectCourses');
        }

        function toggleCourse(course) {
            const index = appState.selectedCourses.indexOf(course);
            if (index > -1) { appState.selectedCourses.splice(index, 1); } else { appState.selectedCourses.push(course); }
            const cb = document.getElementById(`course_${course.replace(/\s+/g, '_')}`);
            if(cb) cb.parentElement.className = `flex items-center p-4 border rounded-lg cursor-pointer transition ${cb.checked ? 'bg-teal-50 border-teal-500 text-teal-800 font-medium' : 'bg-slate-50 border-slate-200 hover:border-teal-300 text-slate-700 font-medium'}`;
        }

        function selectAllCourses(coursesStr) {
            const courses = coursesStr.split(',');
            appState.selectedCourses = [...courses];
            renderApp();
        }

        function handleCourseSelectionSubmit() {
            if (appState.selectedCourses.length === 0) { alert("Lütfen değerlendirme yapmak için en az bir ders/modül seçiniz."); return; }
            
            appState.selectedCourses.forEach(c => { 
                if(!appState.evaluations[c]) appState.evaluations[c] = {}; 
            });
            setView('assessment');
        }

        function handleEvalChange(course, idx, value) {
            if (!appState.evaluations[course]) appState.evaluations[course] = {};
            appState.evaluations[course][idx] = value;
        }

        function setAllEvals(course, value) {
            const isPreschool = appState.currentStudent.level === "Ana Sınıfı";
            const db = isPreschool ? PRESCHOOL_DATABASE : PRIMARY_DATABASE;
            const kdaList = db[course]?.kdaList || [];
            if (!appState.evaluations[course]) appState.evaluations[course] = {};
            kdaList.forEach((_, idx) => {
                appState.evaluations[course][idx] = value;
            });
            renderApp();
        }

        function handleAssessmentSubmit() {
            let hasHayir = false;
            Object.keys(appState.evaluations).forEach(course => {
                Object.values(appState.evaluations[course]).forEach(val => {
                    if (val === "Hayır") hasHayir = true;
                });
            });

            if (!hasHayir) {
                alert("BEP oluşturabilmek için en az bir kazanımı 'Hayır' olarak işaretlemeniz gerekmektedir.");
                return;
            }

            if(Object.keys(appState.selectedBEPGoals).length === 0) {
               appState.selectedBEPGoals = {};
            }
            setView('selectGoals');
        }

        function toggleBEPGoal(course, idx, checkbox) {
            if (!appState.selectedBEPGoals[course]) appState.selectedBEPGoals[course] = [];
            const goals = appState.selectedBEPGoals[course];
            const index = goals.indexOf(idx);
            
            if (checkbox.checked) {
                if (index === -1) goals.push(idx);
                checkbox.parentElement.className = "flex items-start p-3 border rounded-md cursor-pointer transition bg-emerald-100 border-emerald-400 font-medium text-emerald-900";
            } else {
                if (index > -1) goals.splice(index, 1);
                checkbox.parentElement.className = "flex items-start p-3 border rounded-md cursor-pointer transition hover:bg-slate-50 border-slate-200 text-slate-700 font-medium";
            }
        }

        function selectAllListedGoals() {
            const newSelections = {};
            Object.keys(appState.evaluations).forEach(course => {
                const courseEvals = appState.evaluations[course];
                const hayirIndices = Object.keys(courseEvals).filter(idx => courseEvals[idx] === "Hayır").map(Number);
                if(hayirIndices.length > 0) {
                    newSelections[course] = hayirIndices;
                }
            });
            appState.selectedBEPGoals = newSelections;
            renderApp();
        }

        function handleGoalSelectionSubmit() {
            let selectedAny = false;
            Object.values(appState.selectedBEPGoals).forEach(arr => { if (arr.length > 0) selectedAny = true; });
            
            if (!selectedAny) { alert('Lütfen plana dahil edilecek en az bir amaç seçin.'); return; }

            const bepAreas = [];
            const isPreschool = appState.currentStudent.level === "Ana Sınıfı";
            const db = isPreschool ? PRESCHOOL_DATABASE : PRIMARY_DATABASE;
            const startD = appState.currentStudent.bepStartDate;
            const endD = appState.currentStudent.bepEndDate;

            if(!startD || !endD) {
                alert("Lütfen öğrenci bilgileri ekranından BEP başlangıç ve bitiş tarihlerini belirleyiniz.");
                return;
            }

            Object.keys(appState.selectedBEPGoals).forEach(course => {
                const selectedIndices = appState.selectedBEPGoals[course];
                if (selectedIndices.length === 0) return;

                const courseData = db[course] || { uda: "Genel Beceriler", kdaList: [], methods: "", materials: "" };
                const selectedKdas = selectedIndices.map(idx => courseData.kdaList[idx]);
                
                const dates = distributeDates(selectedKdas.length, startD, endD);
                
                const kdaWithDates = selectedKdas.map((kdaStr, index) => ({
                    description: kdaStr, startDate: dates[index]?.start || "-", endDate: dates[index]?.end || "-"
                }));

                let materialsStr = courseData.materials || "Ders materyalleri";
                if (ACADEMIC_COURSES.includes(course) && !materialsStr.toLowerCase().includes("ders kitabı")) {
                    materialsStr = "Ders kitabı, " + materialsStr;
                }

                bepAreas.push({
                    area: course, uda: courseData.uda, methods: courseData.methods || "Doğrudan Öğretim",
                    materials: materialsStr, kdaList: kdaWithDates
                });
            });

            const isExisting = appState.currentStudent.id !== null;
            const studentToSave = {
                ...appState.currentStudent, 
                id: isExisting ? appState.currentStudent.id : Date.now(),
                bep: bepAreas, 
                evaluations: JSON.parse(JSON.stringify(appState.evaluations)), 
                selectedBEPGoals: JSON.parse(JSON.stringify(appState.selectedBEPGoals)),
                selectedCourses: JSON.parse(JSON.stringify(appState.selectedCourses)),
                createdAt: isExisting ? appState.currentStudent.createdAt : new Date().toLocaleDateString('tr-TR')
            };

            if (isExisting) { 
                const idx = appState.students.findIndex(s => s.id === studentToSave.id);
                if (idx > -1) appState.students[idx] = studentToSave;
            } else { appState.students.push(studentToSave); }

            appState.generatedBEP = studentToSave;
            setView('bepView');
        }

        function startNewStudent() {
            appState.formError = '';
            appState.currentStudent = JSON.parse(JSON.stringify(defaultStudentState));
            appState.evaluations = {};
            appState.selectedBEPGoals = {};
            appState.selectedCourses = [];
            setView('addStudent');
        }

        function editStudent(id) {
            appState.formError = '';
            const std = appState.students.find(s => s.id === id);
            if (std) {
                appState.currentStudent = JSON.parse(JSON.stringify(std));
                appState.evaluations = JSON.parse(JSON.stringify(std.evaluations || {}));
                appState.selectedBEPGoals = JSON.parse(JSON.stringify(std.selectedBEPGoals || {}));
                appState.selectedCourses = JSON.parse(JSON.stringify(std.selectedCourses || []));
                setView('addStudent');
            }
        }

        function deleteStudent(id) {
            if(window.confirm('Bu öğrenciyi ve BEP kaydını silmek istediğinize emin misiniz?')) {
                appState.students = appState.students.filter(s => s.id !== id);
                renderApp();
            }
        }

        function deleteStudentAndGoHome(id) {
            if(window.confirm('Bu öğrenciyi ve BEP kaydını silmek istediğinize emin misiniz?')) {
                appState.students = appState.students.filter(s => s.id !== id);
                appState.generatedBEP = null;
                setView('dashboard');
            }
        }

            appState.currentUser = null;
            setView('auth');

                ${html || emptyMsg}
                <div class="mt-10 flex justify-between items-center border-t pt-8">
                  <button onclick="setView('assessment')" class="text-slate-500 font-bold">Değerlendirmeye Dön</button>
                  <button onclick="handleGoalSelectionSubmit()" class="bg-emerald-600 text-white px-10 py-4 rounded-xl font-bold text-lg shadow-xl hover:bg-emerald-700 transition transform hover:scale-105">BEP OLUŞTUR</button>
                </div>
              </div>
            </div>`;
        }

        function buildEvaluationFormsHtml(studentData) {
            const teacher = `${appState.currentUser.firstName} ${appState.currentUser.lastName}`;

            const forms = studentData.bep.map(area => {
                const rows = area.kdaList.map(kda => `
                    <tr>
                      <td class="text-sm p-3">${kda.description}</td>
                      <td class="text-center text-xs">3/4 (%80)</td>
                      <td class="border-l-2"></td><td></td><td></td><td></td><td class="border-r-2"></td>
                    </tr>`).join('');

                return `
                <div class="print-break mb-12">
                  <div class="text-center mb-6 border-b-2 border-black pb-4">
                    <h2 class="text-xl font-bold">${area.area.toUpperCase()} ÖLÇÜT BAĞIMLI ÖLÇÜ ARACI (ÖBÖA)</h2>
                    <p class="text-sm text-slate-600">Öğrenci İzleme ve Gelişim Formu</p>
                  </div>
                  
                  <div class="grid grid-cols-2 gap-8 text-sm mb-6 border p-4 rounded bg-slate-50 no-break">
                    <div><strong>Öğrenci:</strong> ${studentData.firstName} ${studentData.lastName}</div>
                    <div><strong>Sınıfı / No:</strong> ${studentData.level} - ${studentData.className} / ${studentData.schoolNo}</div>
                    <div><strong>Uygulayıcı:</strong> ${teacher}</div>
                    <div><strong>BEP Dönemi:</strong> ${new Date(studentData.bepStartDate).toLocaleDateString('tr-TR')} - ${new Date(studentData.bepEndDate).toLocaleDateString('tr-TR')}</div>
                  </div>

                  <p class="bg-slate-800 text-white p-3 font-bold mb-1 no-break">UDA: ${area.uda}</p>
                  
                  <table>
                    <thead>
                      <tr>
                        <th rowspan="2" class="text-left bg-slate-200">Kısa Dönemli Amaçlar (KDA)</th>
                        <th rowspan="2" class="w-20 text-center bg-slate-200">Ölçüt</th>
                        <th colspan="5" class="text-center bg-slate-300">Değerlendirme Tarihleri</th>
                      </tr>
                      <tr class="bg-slate-100">
                        <th class="w-24 text-center text-[10px]">.../.../20...</th>
                        <th class="w-24 text-center text-[10px]">.../.../20...</th>
                        <th class="w-24 text-center text-[10px]">.../.../20...</th>
                        <th class="w-24 text-center text-[10px]">.../.../20...</th>
                        <th class="w-24 text-center text-[10px]">.../.../20...</th>
                      </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                  </table>
                  
                  <div class="mt-4 p-4 border rounded bg-indigo-50 text-[11px] text-indigo-900 leading-relaxed no-break">
                    <strong>Puanlama Anahtarı:</strong> Değerlendirme sırasında kazanılan beceri basamağına <strong>(+)</strong>, henüz kazanılamayanlara <strong>(-)</strong> yazınız.<br/>
                    <strong>İpucu Kısaltmaları:</strong> B (Bağımsız), Sİ (Sözel İpucu), MY (Model Olma), FY (Fiziksel Yardım)
                  </div>
                </div>`;
            }).join('');

            return `<div class="w-full bg-white mx-auto print-container">${forms}</div>`;
        }

        function renderBEP() {
            const std = appState.generatedBEP;
            if (!std) return '';
            
            const veli = `${std.guardian === "Anne" ? std.motherName : std.fatherName} ${std.guardian === "Anne" ? std.motherSurname : std.fatherSurname}`;
            const teacher = `${appState.currentUser.firstName} ${appState.currentUser.lastName} (${appState.currentUser.branch})`;

            const renderBEPPart = (bepList, titleSuffix) => {
                if (bepList.length === 0) return '';
                return `
                <div class="w-full bg-white mx-auto print-container print:p-0">
                  
                  <!-- DİKEY BÖLÜM (Kapak ve Performans) -->
                  <div class="page-portrait">
                      <div class="text-center mb-6 border-b-2 border-black pb-4 no-break">
                        <h1 class="text-xl font-bold">${titleSuffix}BİREYSELLEŞTİRİLMİŞ EĞİTİM PROGRAMI (BEP) DOSYASI</h1>
                      </div>

                      <div class="no-break">
                          <h2 class="font-bold bg-slate-200 p-2 border border-black mb-0">I- Öğrenci Bilgileri</h2>
                          <table class="!border-collapse !border-black">
                            <tbody>
                              <tr><td class="w-[30%] font-bold">Adı-Soyadı</td><td class="w-[70%]">${std.firstName} ${std.lastName}</td></tr>
                              <tr><td class="font-bold">Okul / No / Sınıf</td><td>${std.schoolName} / ${std.schoolNo} / ${std.level} - ${std.className}</td></tr>
                              <tr><td class="font-bold">Doğum Tarihi</td><td>${new Date(std.birthDate).toLocaleDateString('tr-TR')}</td></tr>
                              <tr><td class="font-bold">Tanı / Karar</td><td>${std.disability} / ${std.decision}</td></tr>
                              <tr><td class="font-bold">Eğitim Ortamı Düzenlemeleri</td><td>${std.environmentMods || "-"}</td></tr>
                              <tr><td class="font-bold">BEP Dönemi</td><td>${new Date(std.bepStartDate).toLocaleDateString('tr-TR')} - ${new Date(std.bepEndDate).toLocaleDateString('tr-TR')}</td></tr>
                            </tbody>
                          </table>
                      </div>

                      <div class="no-break mt-4">
                          <h2 class="font-bold bg-slate-200 p-2 border border-black mb-0">Aile İle İlgili Bilgiler</h2>
                          <table class="!border-collapse !border-black">
                            <thead>
                              <tr>
                                <th class="w-1/4"></th><th class="w-1/4">Anne</th><th class="w-1/4">Baba</th><th class="w-1/4">Veli/Vasi (${std.guardian})</th>
                              </tr>
                            </thead>
                            <tbody>
                              <tr><td class="font-bold">Adı-Soyadı</td><td>${std.motherName} ${std.motherSurname}</td><td>${std.fatherName} ${std.fatherSurname}</td><td class="font-bold">${veli}</td></tr>
                              <tr><td class="font-bold">Telefon</td><td colspan="3" class="text-center">${std.parentPhone || "-"}</td></tr>
                              <tr><td class="font-bold">Ev Adresi</td><td colspan="3" class="text-center">${std.parentAddress || "-"}</td></tr>
                            </tbody>
                          </table>
                      </div>

                      <div class="print-break mt-4">
                          <h2 class="font-bold bg-slate-200 p-2 border border-black mb-0">II- Eğitsel Performans Formu</h2>
                          <table class="!border-collapse !border-black">
                            <thead>
                              <tr><th class="w-1/3">Gelişim Alanları/Dersler</th><th>Performans Düzeyi (Kaba Değerlendirme Sonucu)</th></tr>
                            </thead>
                            <tbody>
                              ${bepList.map(area => `
                                <tr>
                                  <td class="font-bold">${area.area}</td>
                                  <td>Öğrenci bu derste/alanda "${area.uda}" amacını gerçekleştirmede bağımsız değildir. Desteklenmesi gerekmektedir.</td>
                                </tr>`).join('')}
                            </tbody>
                          </table>
                      </div>
                  </div>

                  <!-- YATAY BÖLÜM (BEP Planı) -->
                  <div class="WordSection2 page-landscape print-break mt-8">
                      <h2 class="font-bold bg-slate-200 p-2 border border-black mb-4 text-center">III- BİREYSELLEŞTİRİLMİŞ EĞİTİM PLANI</h2>
                      ${bepList.map(area => `
                        <div class="no-break mb-8">
                          <div class="bg-slate-800 text-white p-2 font-bold border border-black border-b-0">${area.area.toUpperCase()}</div>
                          <table class="!border-collapse !border-black">
                            <thead>
                              <tr>
                                <th rowspan="2" class="w-[15%]">Uzun Dönemli Amaçlar</th>
                                <th rowspan="2" class="w-[20%]">Kısa Dönemli Amaçlar</th>
                                <th rowspan="2" class="w-[8%] text-center">Ölçüt</th>
                                <th rowspan="2" class="w-[15%]">Yöntem ve Teknik</th>
                                <th rowspan="2" class="w-[15%]">Kullanılacak Materyaller</th>
                                <th rowspan="2" class="w-[12%] text-center">Başlama ve Bitiş Trh.</th>
                                <th colspan="3" class="w-[15%] text-center">Ölçme-Değerlendirme</th>
                              </tr>
                              <tr>
                                <th class="text-[10px] text-center">Yöntem</th><th class="text-[10px] text-center">Tarih</th><th class="text-[10px] text-center">Perf.</th>
                              </tr>
                            </thead>
                            <tbody>
                              ${area.kdaList.map((kda, kIdx) => `
                                <tr>
                                  ${kIdx===0?`<td rowspan="${area.kdaList.length}" class="align-middle">${area.uda}</td>`:''}
                                  <td>${kda.description}</td>
                                  <td class="text-center align-middle">4/5 (%80)</td>
                                  ${kIdx===0?`<td rowspan="${area.kdaList.length}" class="align-middle">${area.methods}</td><td rowspan="${area.kdaList.length}" class="align-middle">${area.materials}</td>`:''}
                                  <td class="text-center text-[10px] align-middle">${kda.startDate}<br/>-<br/>${kda.endDate}</td>
                                  <td class="text-[10px] text-center align-middle">Gözlem</td><td class="text-[10px] text-center align-middle">${kda.endDate}</td><td class="text-[10px] text-center align-middle">(+) / (-)</td>
                                </tr>`).join('')}
                            </tbody>
                          </table>
                        </div>`).join('')}
                  </div>

                  <!-- DİKEY BÖLÜM 2 (Kararlar ve İmzalar) -->
                  <div class="WordSection1 page-portrait print-break mt-8">
                     <h2 class="font-bold bg-slate-200 p-2 border border-black mb-4">IV- BEP Geliştirme Birim Kararları</h2>
                     
                     <p class="font-bold text-sm mb-1">A. Öğrencinin alacağı okul içi diğer eğitim hizmetleri</p>
                     <table class="!border-collapse !border-black">
                       <thead><tr><th>Hizmet Türü</th><th>Ders / Alan</th><th>Haftalık Süre</th><th>Sorumlu Kişi</th></tr></thead>
                       <tbody>
                         ${std.usesSupportRoom === "Evet" ? `<tr><td>Destek Eğitim Odası</td><td>${std.supportRoomCourses.join(", ")}</td><td>${std.supportRoomHours} Saat</td><td>${std.supportRoomTeacher || "-"}</td></tr>` : '<tr><td colspan="4" class="text-center py-4">Planlanmamıştır.</td></tr>'}
                       </tbody>
                     </table>
                     
                     <p class="font-bold text-sm mb-1 mt-6">B. Aile bilgilendirme süreci</p>
                     <table class="!border-collapse !border-black">
                       <tbody>
                         <tr><td class="w-2/3">Aile öğrencinin gelişimi ile ilgili hangi sıklıkla bilgilendirilecek?</td><td class="font-bold">${std.familyInfoFrequency}</td></tr>
                         <tr><td>Aile öğrencinin gelişimi ile ilgili hangi yolla bilgilendirilecek?</td><td class="font-bold">${std.familyInfoMethod}</td></tr>
                         <tr><td>Aile eğitimi yapılacak mı?</td><td class="font-bold">${std.familyEducation === "Evet" ? "Evet (X) Hayır ( )" : "Evet ( ) Hayır (X)"}</td></tr>
                       </tbody>
                     </table>

                     <p class="font-bold text-sm mb-1 mt-6">C. Diğer Kararlar</p>
                     <div class="mb-6 border border-black p-4 min-h-[60px]">
                        1. Öğrencinin ilgisini çekecek pekiştireçler kullanılacaktır.<br/>
                        2. Bir sonraki toplantı tarihi: ${new Date(std.bepEndDate).toLocaleDateString('tr-TR')}
                     </div>

                     <h2 class="font-bold bg-slate-200 p-2 border border-black mb-4 mt-8">V- BEP GELİŞTİRME BİRİM ÜYELERİ</h2>
                     <table class="text-center !border-collapse !border-black">
                       <thead>
                         <tr><th class="w-[30%]">Unvanı</th><th class="w-[40%]">Adı Soyadı</th><th class="w-[30%] text-center">İmza</th></tr>
                       </thead>
                       <tbody>
                         <tr><td class="align-middle py-3">Müdür / Müdür Yrd. (Başkan)</td><td></td><td></td></tr>
                         <tr><td class="align-middle py-3">Öğrencinin Velisi</td><td class="align-middle font-bold">${veli}</td><td></td></tr>
                         <tr><td class="align-middle py-3">Sınıf Öğretmeni / BEP Sorumlusu</td><td class="align-middle font-bold">${teacher}</td><td></td></tr>
                         <tr><td class="align-middle py-3">Rehber Öğretmen / Psikolojik Danışman</td><td></td><td></td></tr>
                         <tr><td class="align-middle py-3">Alan Öğretmenleri (Varsa)</td><td></td><td></td></tr>
                       </tbody>
                     </table>

                     <div class="text-right mt-12 pr-12 font-bold">
                       <p>Uygundur</p>
                       <p>..... / ..... / 20...</p>
                       <p>Okul Müdürü</p>
                     </div>
                  </div>
                </div>`;
            };

            const anaBEP = renderBEPPart(std.bep, "");
            const destekBEPList = std.bep.filter(a => std.supportRoomCourses.includes(a.area));
            const destekBEP = (std.usesSupportRoom === "Evet" && destekBEPList.length > 0) 
              ? `<div class="print-break mt-10 pt-10 border-t-4 border-dashed border-slate-300 hide-on-print"><p class="text-center text-slate-400 font-bold mb-4 uppercase">AŞAĞIDAKİ BÖLÜM "DESTEK EĞİTİM ODASI" İÇİN AYRI BİR DOSYADIR</p></div>${renderBEPPart(destekBEPList, "DESTEK EĞİTİM ODASI ")}` 
              : '';
            
            const fileName = `${std.firstName}_${std.lastName}_BEP_Dosyasi.docx`;

            return `
            <div class="min-h-screen bg-slate-200 p-8 print:p-0 print:bg-white flex flex-col items-center">
              <div class="w-full max-w-[210mm] mb-6 flex flex-col md:flex-row justify-between hide-on-print bg-white p-4 rounded-xl shadow-md border border-slate-300 gap-4">
                <div class="flex gap-2">
                    <button onclick="setView('dashboard')" class="text-blue-700 font-bold flex items-center bg-blue-50 px-4 py-2 rounded-lg hover:bg-blue-100 transition"><i data-lucide="arrow-left" class="mr-2 w-5 h-5"></i> Panele Dön</button>
                    <button onclick="editStudent(${std.id})" class="text-slate-600 font-bold flex items-center bg-slate-100 px-4 py-2 rounded-lg hover:bg-slate-200 transition"><i data-lucide="edit" class="mr-2 w-4 h-4"></i> Düzenle</button>
                    <button onclick="deleteStudentAndGoHome(${std.id})" class="text-red-600 font-bold flex items-center bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100 transition"><i data-lucide="trash-2" class="mr-2 w-4 h-4"></i> Sil</button>
                </div>
                <div class="flex gap-3">
                  <button onclick="setView('evalFormsView')" class="bg-indigo-600 text-white px-5 py-2 rounded-lg font-bold shadow-sm hover:bg-indigo-700">Değerlendirme Formları (ÖBÖA)</button>
                  <button onclick="exportHTMLToExcel('bep-wrapper', '${std.firstName}_${std.lastName}_BEP.xls')" class="bg-green-700 text-white px-5 py-2 rounded-lg font-bold hover:bg-green-800">Excel'e Aktar</button>
                  <button onclick="exportHTMLToWord('bep-wrapper', '${fileName}')" class="bg-slate-700 text-white px-5 py-2 rounded-lg font-bold hover:bg-slate-800">Word'e Aktar</button>
                  <button onclick="window.print()" class="bg-blue-800 text-white px-6 py-2 rounded-lg flex items-center font-bold shadow-lg hover:bg-blue-900 transition">
                    <i data-lucide="printer" class="mr-2 w-5 h-5"></i> Yazdır / PDF
                  </button>
                </div>
              </div>
              <div id="bep-wrapper" class="w-full print:p-0">${anaBEP}${destekBEP}</div>
            </div>`;
        }

        function renderEvalForms() {
            const std = appState.generatedBEP;
            if (!std) return '';
            const fileName = `${std.firstName}_${std.lastName}_Degerlendirme_Formlari.docx`;

            return `
            <div class="min-h-screen bg-slate-200 p-8 print:p-0 print:bg-white flex flex-col items-center">
              <div class="w-full max-w-[210mm] mb-6 flex justify-between hide-on-print bg-white p-4 rounded-xl shadow-md border border-slate-300">
                <div class="flex gap-2">
                    <button onclick="setView('bepView')" class="text-blue-700 font-bold flex items-center bg-blue-50 px-4 py-2 rounded-lg"><i data-lucide="arrow-left" class="mr-2 w-5 h-5"></i> BEP Dosyasına Dön</button>
                    <button onclick="editStudent(${std.id})" class="text-slate-600 font-bold flex items-center bg-slate-100 px-4 py-2 rounded-lg hover:bg-slate-200 transition"><i data-lucide="edit" class="mr-2 w-4 h-4"></i> Düzenle</button>
                    <button onclick="deleteStudentAndGoHome(${std.id})" class="text-red-600 font-bold flex items-center bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100 transition"><i data-lucide="trash-2" class="mr-2 w-4 h-4"></i> Sil</button>
                </div>
                <div class="flex gap-2">
                  <button onclick="exportHTMLToExcel('eval-wrapper', '${std.firstName}_${std.lastName}_OBOA.xls')" class="bg-green-700 text-white px-5 py-2 rounded-lg font-bold hover:bg-green-800">Excel'e Aktar</button>
                  <button onclick="exportHTMLToWord('eval-wrapper', '${fileName}')" class="bg-slate-700 text-white px-5 py-2 rounded-lg font-bold">Word'e Aktar</button>
                  <button onclick="window.print()" class="bg-blue-800 text-white px-6 py-2 rounded-lg flex items-center font-bold">
                    <i data-lucide="printer" class="mr-2 w-5 h-5"></i> Yazdır / PDF
                  </button>
                </div>
              </div>
              <div id="eval-wrapper" class="w-full print:p-0">${buildEvaluationFormsHtml(std)}</div>
            </div>`;
        }

        function renderApp() {
            const root = document.getElementById('root');
            switch(appState.view) {
                case 'auth': root.innerHTML = renderAuth(); break;
                case 'dashboard': root.innerHTML = renderDashboard(); break;
                case 'profile': root.innerHTML = renderProfile(); break;
                case 'addStudent': root.innerHTML = renderAddStudent(); break;
                case 'selectCourses': root.innerHTML = renderSelectCourses(); break;
                case 'assessment': root.innerHTML = renderAssessment(); break;
                case 'selectGoals': root.innerHTML = renderGoalSelection(); break;
                case 'bepView': root.innerHTML = renderBEP(); break;
                case 'evalFormsView': root.innerHTML = renderEvalForms(); break;
            }
            lucide.createIcons();
        }

        window.onload = renderApp;
    </script>
</body>
</html>
