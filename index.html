        const getSchoolDates = () => {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const startYear = currentMonth >= 7 ? currentYear : currentYear - 1;

            let septFirst = new Date(startYear, 8, 1);
            let dayOfWeek = septFirst.getDay();
            let firstMondayOffset = dayOfWeek === 1 ? 0 : dayOfWeek === 0 ? 1 : 8 - dayOfWeek;
            let secondMonday = new Date(startYear, 8, 1 + firstMondayOffset + 7);

            let juneFirst = new Date(startYear + 1, 5, 1);
            let juneDayOfWeek = juneFirst.getDay();
            let firstFridayOffset = juneDayOfWeek === 5 ? 0 : juneDayOfWeek < 5 ? 5 - juneDayOfWeek : 12 - juneDayOfWeek;
            let thirdFriday = new Date(startYear + 1, 5, 1 + firstFridayOffset + 14);

            return { startDate: secondMonday, endDate: thirdFriday };
        };

        const distributeDates = (kdaCount) => {
            if (kdaCount === 0) return [];
            const { startDate, endDate } = getSchoolDates();
            const totalDurationMs = endDate.getTime() - startDate.getTime();
            const chunkMs = totalDurationMs / kdaCount;
            const dates = [];
            let currentStart = new Date(startDate);
            for (let i = 0; i < kdaCount; i++) {
                let currentEnd = new Date(currentStart.getTime() + chunkMs);
                if (i === kdaCount - 1) currentEnd = endDate;
                dates.push({
                    start: currentStart.toLocaleDateString('tr-TR'),
                    end: currentEnd.toLocaleDateString('tr-TR')
                });
                currentStart = new Date(currentEnd);
                currentStart.setDate(currentStart.getDate() + 1);
            }
            return dates;
        };

        const validateTC = (tc) => {
            if (!/^[1-9]\d{10}$/.test(tc)) return false; 
            const digits = tc.split('').map(Number);
            const oddSum = digits[0] + digits[2] + digits[4] + digits[6] + digits[8];
            const evenSum = digits[1] + digits[3] + digits[5] + digits[7];
            const tenth = ((oddSum * 7) - evenSum) % 10;
            if (tenth !== digits[9]) return false;
            const firstTenSum = digits.slice(0, 10).reduce((a, b) => a + b, 0);
            const eleventh = firstTenSum % 10;
            if (eleventh !== digits[10]) return false;
            return true;
        };

        // Word export function
        function exportHTMLToWord(elementId, filename = 'BEP_Dosyasi.doc') {
            const element = document.getElementById(elementId);
            if(!element) return;
            
            const style = `
                <style>
                    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; font-size: 10pt; } 
                    th, td { border: 1px solid black; padding: 6px; text-align: left; vertical-align: top;} 
                    th { background-color: #f1f5f9; font-weight: bold; }
                    h1, h2, h3 { font-family: Arial, sans-serif; text-align: center; } 
                    body { font-family: Arial, sans-serif; }
                    .print-break { page-break-before: always; }
                    .hide-on-print { display: none; }
                </style>
            `;
            
            const html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>BEP Dosyasi</title>${style}</head>
                <body>${element.innerHTML}</body>
                </html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

            const db = isPreschool ? PRESCHOOL_DATABASE : PRIMARY_DATABASE;
            const kdaList = db[course]?.kdaList || [];
            if (!appState.evaluations[course]) appState.evaluations[course] = {};
            kdaList.forEach((_, idx) => {
                appState.evaluations[course][idx] = value;
                const radio = document.querySelector(`input[name="eval_${course.replace(/\s+/g, '')}_${idx}"][value="${value}"]`);
                if(radio) radio.checked = true;
            });
        }

        function handleAssessmentSubmit() {
            let hasHayir = false;
            Object.keys(appState.evaluations).forEach(course => {
                Object.values(appState.evaluations[course]).forEach(val => {
                    if (val === "Hayır") hasHayir = true;
                });
            });

            if (!hasHayir) {
                alert("Tüm beceriler 'Evet' veya 'Gözlem Yapılamadı' olarak işaretlendi. BEP'e alınacak 'Hayır' (yapamadığı) beceri bulunamadı. Lütfen kontrol ediniz.");
                return;
            }

            appState.selectedBEPGoals = {};
            setView('selectGoals');
        }

        function toggleBEPGoal(course, idx, checkbox) {
            if (!appState.selectedBEPGoals[course]) appState.selectedBEPGoals[course] = [];
            const goals = appState.selectedBEPGoals[course];
            const index = goals.indexOf(idx);
            
            if (checkbox.checked) {
                if (index === -1) goals.push(idx);
                checkbox.parentElement.className = "flex items-start p-3 border rounded-md cursor-pointer transition bg-emerald-100 border-emerald-400 font-medium text-emerald-900";
            } else {
                if (index > -1) goals.splice(index, 1);
                checkbox.parentElement.className = "flex items-start p-3 border rounded-md cursor-pointer transition hover:bg-slate-50 border-slate-200 text-slate-700 font-medium";
            }
        }

        function selectAllListedGoals() {
            const newSelections = {};
            Object.keys(appState.evaluations).forEach(course => {
                const courseEvals = appState.evaluations[course];
                const hayirIndices = Object.keys(courseEvals).filter(idx => courseEvals[idx] === "Hayır").map(Number);
                if(hayirIndices.length > 0) {
                    newSelections[course] = hayirIndices;
                }
            });
            appState.selectedBEPGoals = newSelections;
            renderApp(); // Checkboxes görsel işaretleme
        }

        function handleGoalSelectionSubmit() {
            let selectedAny = false;
            Object.values(appState.selectedBEPGoals).forEach(arr => { if (arr.length > 0) selectedAny = true; });
            
            if (!selectedAny) {
                alert('Lütfen bu yılın BEP programına eklenecek en az bir amaç seçin.');
                return;
            }

            const bepAreas = [];
            const isPreschool = appState.currentStudent.level === "Ana Sınıfı";
            const db = isPreschool ? PRESCHOOL_DATABASE : PRIMARY_DATABASE;
            const academicCourses = ["Türkçe", "Matematik", "Hayat Bilgisi", "Fen ve Teknoloji", "Sosyal Bilgiler", "Din Kültürü ve Ahlak Bilgisi"];

            Object.keys(appState.selectedBEPGoals).forEach(course => {
                const selectedIndices = appState.selectedBEPGoals[course];
                if (selectedIndices.length === 0) return;

                const courseData = db[course] || { uda: "Genel Beceriler", kdaList: [], methods: "", materials: "" };
                const selectedKdas = selectedIndices.map(idx => courseData.kdaList[idx]);
                
                const dates = distributeDates(selectedKdas.length);
                const kdaWithDates = selectedKdas.map((kdaStr, index) => ({
                    description: kdaStr,
                    startDate: dates[index].start,
                    endDate: dates[index].end
                }));

                // Ders Kitabı Eklemesi
                let materialsStr = courseData.materials || "Ders materyalleri";
                if (academicCourses.includes(course) && !materialsStr.toLowerCase().includes("ders kitabı")) {
                    materialsStr = "Ders kitabı, " + materialsStr;
                }

                bepAreas.push({
                    area: course,
                    uda: courseData.uda,
                    methods: courseData.methods || "Doğrudan Öğretim",
                    materials: materialsStr,
                    kdaList: kdaWithDates
                });
            });

            const isExisting = appState.currentStudent.id !== null;
            const studentToSave = {
                ...appState.currentStudent,
                id: isExisting ? appState.currentStudent.id : Date.now(),
                bep: bepAreas,
                createdAt: isExisting ? appState.currentStudent.createdAt : new Date().toLocaleDateString('tr-TR')
            };

            if (isExisting) { 
                const idx = appState.students.findIndex(s => s.id === studentToSave.id);
                if (idx > -1) appState.students[idx] = studentToSave;
            } else { 
                appState.students.push(studentToSave);
            }

            appState.generatedBEP = studentToSave;
            appState.currentStudent = JSON.parse(JSON.stringify(defaultStudentState));
            setView('bepView');
        }

        function editStudent(id) {
            appState.formError = '';

            if (std) {

            }
        }

                  <tr><td class="font-bold">BEP Başlangıç Tarihi</td><td>${startDate.toLocaleDateString('tr-TR')}</td></tr>
                  <tr><td class="font-bold">BEP Bitiş Tarihi</td><td>${endDate.toLocaleDateString('tr-TR')}</td></tr>
                </tbody>
              </table>

              <h2 class="font-bold bg-slate-200 p-1 mb-2 mt-4">Aile İle İlgili Bilgiler</h2>
              <table>
                <thead>
                  <tr>
                    <th class="w-1/4"></th>
                    <th class="w-1/4">Anne</th>
                    <th class="w-1/4">Baba</th>
                    <th class="w-1/4">Veli/Vasi (${studentData.guardian})</th>
                  </tr>
                </thead>
                <tbody>
                  <tr><td class="font-bold">Adı-Soyadı</td><td>${studentData.motherName}</td><td>${studentData.fatherName}</td><td class="font-bold">${veliAdiSoyadi}</td></tr>
                  <tr><td class="font-bold">Telefon</td><td colspan="3" class="text-center">${studentData.parentPhone || "-"}</td></tr>
                  <tr><td class="font-bold">Ev Adresi</td><td colspan="3" class="text-center">${studentData.parentAddress || "-"}</td></tr>
                </tbody>
              </table>

              <h2 class="font-bold bg-slate-200 p-1 mb-2 mt-4 print-break">Eğitsel Performans Formu</h2>
              <table>
                <thead>
                  <tr><th class="w-1/3">Gelişim Alanları/Dersler</th><th>Performans Düzeyi (Kaba Değerlendirme Sonucu)</th></tr>
                </thead>
                <tbody>
                  ${perfRows}
                </tbody>
              </table>

              <div class="print-break mt-8">
                <h2 class="font-bold bg-slate-200 p-2 mb-4 text-center text-[14px]">BİREYSELLEŞTİRİLMİŞ EĞİTİM PLANI</h2>
                ${planTables}
              </div>

              <div class="print-break mt-4">
                 <h2 class="font-bold bg-slate-200 p-1 mb-2">BEP Geliştirme Birim Kararları</h2>
                 
                 <h3 class="font-bold text-[11px] mb-1">A. Öğrencinin Alacağı Okul İçi Diğer Eğitim Hizmetleri</h3>
                 <table class="mb-4">
                   <thead><tr><th>Hizmet Türü</th><th>Gelişim Alanı/Ders</th><th>Haftalık Süre</th><th>Sorumlu Kişi(ler)</th></tr></thead>
                   <tbody>${supportRow}</tbody>
                 </table>

                 <h3 class="font-bold text-[11px] mb-1">B. Aile Bilgilendirme Süreci</h3>
                 <table class="mb-4">
                   <tbody>
                     <tr><td class="w-3/4">Aile öğrencinin gelişimi ile ilgili hangi sıklıkla bilgilendirilecek?</td><td class="font-bold">${studentData.familyInfoFrequency}</td></tr>
                     <tr><td>Aile öğrencinin gelişimi ile ilgili hangi yolla bilgilendirilecek?</td><td class="font-bold">${studentData.familyInfoMethod}</td></tr>
                     <tr><td>Aile eğitimi yapılacak mı?</td><td class="font-bold">${studentData.familyEducation === "Evet" ? "Evet (X) Hayır ( )" : "Evet ( ) Hayır (X)"}</td></tr>
                   </tbody>
                 </table>

                 <div class="mb-6 border p-2 min-h-[60px]">
                    <strong>C. Diğer Kararlar:</strong><br/>
                    1. Öğrencinin ilgisini çekecek pekiştireçler kullanılacaktır.<br/>
                    2. Bir sonraki toplantı tarihi: ${endDate.toLocaleDateString('tr-TR')}
                 </div>

                 <div class="text-center mb-6">
                    <h3 class="font-bold text-[14px]">BEP GELİŞTİRME BİRİM ÜYELERİ</h3>
                 </div>

                 <table class="text-center">
                   <thead>
                     <tr><th class="w-[30%]">Unvanı</th><th class="w-[40%]">Adı Soyadı</th><th class="w-[30%]">İmza</th></tr>
                   </thead>
                   <tbody>
                     <tr class="h-10">
                       <td class="align-middle">Müdür / Müdür Yrd. (Başkan)</td><td></td><td></td>
                     </tr>
                     <tr class="h-10">
                       <td class="align-middle">Öğrencinin Velisi</td><td class="align-middle font-bold">${veliAdiSoyadi}</td><td></td>
                     </tr>
                     <tr class="h-10">
                       <td class="align-middle">Sınıf Öğretmeni / Özel Eğt. Öğrt.</td>
                       <td class="align-middle">
                         <span class="font-bold">${teacherName}</span><br/>
                         <span class="text-[10px] text-gray-700">${teacherBranch}</span>
                       </td>
                       <td></td>
                     </tr>
                     <tr class="h-10">
                       <td class="align-middle">Rehber Öğretmen</td><td></td><td></td>
                     </tr>
                     <tr class="h-10">
                       <td class="align-middle">Alan Öğretmenleri (Varsa)</td><td></td><td></td>
                     </tr>
                   </tbody>
                 </table>

                 <div class="text-right mt-12 pr-12 font-bold">
                   <p>Uygundur</p>
                   <p>..... / ..... / 20...</p>
                   <p>Okul Müdürü</p>
                 </div>
              </div>
            </div>`;
        }

        function renderBEP() {
            if (!appState.generatedBEP) return '';
            const std = appState.generatedBEP;
            
            let destekHtml = '';
            if (std.usesSupportRoom === "Evet" && std.supportRoomCourses.length > 0) {
                destekHtml = `
                <div class="print-break w-full mt-8 hide-on-print" style="border-top: 4px dashed #94a3b8; padding-top: 2rem;">
                  <div class="text-center text-slate-500 font-bold mb-4 uppercase">
                    --- AŞAĞIDAKİ BÖLÜM "DESTEK EĞİTİM ODASI" İÇİN AYRI BİR DOSYADIR (YAZDIRIRKEN YENİ SAYFADA ÇIKAR) ---
                  </div>
                  ${buildSingleBEPHtml(std, "DESTEK")}
                </div>`;
            }

            return `
            <div class="min-h-screen bg-slate-200 p-8 print:p-0 print:bg-white flex flex-col items-center text-[12px] font-sans">
              
              <div class="w-full max-w-[210mm] mb-4 flex justify-between items-center hide-on-print bg-white p-4 rounded-lg shadow-sm">
                <button onclick="setView('dashboard')" class="text-blue-600 hover:text-blue-800 font-bold flex items-center">
                  <i data-lucide="arrow-left" class="mr-2 w-4 h-4"></i> Panele Dön
                </button>
                <div class="flex space-x-3">
                  <button onclick="exportHTMLToWord('bep-wrapper', 'BEP_Dosyasi.doc')" class="bg-blue-800 text-white px-6 py-2 rounded-lg flex items-center hover:bg-blue-900 font-bold">
                    <i data-lucide="file-text" class="mr-2 w-4 h-4"></i> Word'e Aktar
                  </button>
                  <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-2 rounded-lg flex items-center hover:bg-slate-900 font-bold">
                    <i data-lucide="printer" class="mr-2 w-4 h-4"></i> Yazdır / PDF Al
                  </button>
                </div>
              </div>

              <div id="bep-wrapper" class="w-full print:p-0">
                ${buildSingleBEPHtml(std, "ANA")}
                ${destekHtml}
              </div>
            </div>`;
        }

        // ==========================================
        // 6. ANA RENDER DÖNGÜSÜ
        // ==========================================

        function renderApp() {
            const root = document.getElementById('root');
            
            switch(appState.view) {
                case 'auth': root.innerHTML = renderAuth(); break;
                case 'dashboard': root.innerHTML = renderDashboard(); break;
                case 'profile': root.innerHTML = renderProfile(); break;
                case 'addStudent': root.innerHTML = renderAddStudent(); break;
                case 'selectCourses': root.innerHTML = renderSelectCourses(); break;
                case 'assessment': root.innerHTML = renderAssessment(); break;
                case 'selectGoals': root.innerHTML = renderGoalSelection(); break;
                case 'bepView': root.innerHTML = renderBEP(); break;
                default: root.innerHTML = renderAuth();
            }

            // Lucide ikonlarını yeniden oluştur
            lucide.createIcons();
        }

        // Başlangıç render'ı
        window.onload = function() {
            renderApp();
        };

    </script>
</body>
</html>
