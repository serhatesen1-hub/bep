        const getSchoolDates = () => {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const startYear = currentMonth >= 7 ? currentYear : currentYear - 1;

            let septFirst = new Date(startYear, 8, 1);
            let dayOfWeek = septFirst.getDay();
            let firstMondayOffset = dayOfWeek === 1 ? 0 : dayOfWeek === 0 ? 1 : 8 - dayOfWeek;
            let secondMonday = new Date(startYear, 8, 1 + firstMondayOffset + 7);

            let juneFirst = new Date(startYear + 1, 5, 1);
            let juneDayOfWeek = juneFirst.getDay();
            let firstFridayOffset = juneDayOfWeek === 5 ? 0 : juneDayOfWeek < 5 ? 5 - juneDayOfWeek : 12 - juneDayOfWeek;
            let thirdFriday = new Date(startYear + 1, 5, 1 + firstFridayOffset + 14);

            return { startDate: secondMonday, endDate: thirdFriday };
        };

        const distributeDates = (kdaCount) => {
            if (kdaCount === 0) return [];
            const { startDate, endDate } = getSchoolDates();
            const totalDurationMs = endDate.getTime() - startDate.getTime();
            const chunkMs = totalDurationMs / kdaCount;
            const dates = [];
            let currentStart = new Date(startDate);
            for (let i = 0; i < kdaCount; i++) {
                let currentEnd = new Date(currentStart.getTime() + chunkMs);
                if (i === kdaCount - 1) currentEnd = endDate;
                dates.push({
                    start: currentStart.toLocaleDateString('tr-TR'),
                    end: currentEnd.toLocaleDateString('tr-TR')
                });
                currentStart = new Date(currentEnd);
                currentStart.setDate(currentStart.getDate() + 1);
            }
            return dates;
        };

        const validateTC = (tc) => {
            if (!/^[1-9]\d{10}$/.test(tc)) return false; 
            const digits = tc.split('').map(Number);
            const oddSum = digits[0] + digits[2] + digits[4] + digits[6] + digits[8];
            const evenSum = digits[1] + digits[3] + digits[5] + digits[7];
            const tenth = ((oddSum * 7) - evenSum) % 10;
            if (tenth !== digits[9]) return false;
            const firstTenSum = digits.slice(0, 10).reduce((a, b) => a + b, 0);
            const eleventh = firstTenSum % 10;
            if (eleventh !== digits[10]) return false;
            return true;
        };

        function exportHTMLToWord(elementId, filename = 'BEP_Dosyasi.doc') {
            const element = document.getElementById(elementId);
            if(!element) return;
            
            const style = `
                <style>
                    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; font-size: 10pt; } 
                    th, td { border: 1px solid black; padding: 6px; text-align: left; vertical-align: top;} 
                    th { background-color: #f1f5f9; font-weight: bold; }
                    h1, h2, h3 { font-family: Arial, sans-serif; text-align: center; } 
                    body { font-family: Arial, sans-serif; }
                    .print-break { page-break-before: always; }
                    .hide-on-print { display: none; }
                </style>
            `;
            
            const html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>BEP Dosyası</title>${style}</head>
                <body>${element.innerHTML}</body>
                </html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

                renderApp(); 
                return;

            appState.selectedCourses = [];
            appState.evaluations = {};
            appState.selectedBEPGoals = {};
            setView('selectCourses');

        function toggleCourse(course) {
            const index = appState.selectedCourses.indexOf(course);
            if (index > -1) { appState.selectedCourses.splice(index, 1); } else { appState.selectedCourses.push(course); }
            const cb = document.getElementById(`course_${course}`);
            if(cb) cb.parentElement.className = `flex items-center p-4 border rounded-lg cursor-pointer transition ${cb.checked ? 'bg-teal-50 border-teal-500 text-teal-800 font-medium' : 'bg-slate-50 border-slate-200 hover:border-teal-300 text-slate-700 font-medium'}`;
        }

        function handleCourseSelectionSubmit() {
            if (appState.selectedCourses.length === 0) { alert("Lütfen değerlendirme yapmak için en az bir ders/modül seçiniz."); return; }
            appState.evaluations = {};
            appState.selectedCourses.forEach(c => { appState.evaluations[c] = {}; });
            setView('assessment');
        }

        function handleEvalChange(course, idx, value) {
            if (!appState.evaluations[course]) appState.evaluations[course] = {};
            appState.evaluations[course][idx] = value;
        }

        function setAllEvals(course, value) {
            const isPreschool = appState.currentStudent.level === "Ana Sınıfı";
            const db = isPreschool ? PRESCHOOL_DATABASE : PRIMARY_DATABASE;
            const kdaList = db[course]?.kdaList || [];
            if (!appState.evaluations[course]) appState.evaluations[course] = {};
            kdaList.forEach((_, idx) => {
                appState.evaluations[course][idx] = value;
                const radio = document.querySelector(`input[name="eval_${course.replace(/\s+/g, '')}_${idx}"][value="${value}"]`);
                if(radio) radio.checked = true;
            });
        }

        function toggleBEPGoal(course, idx, checkbox) {
            if (!appState.selectedBEPGoals[course]) appState.selectedBEPGoals[course] = [];
            const goals = appState.selectedBEPGoals[course];
            const index = goals.indexOf(idx);
            
            if (checkbox.checked) {
                if (index === -1) goals.push(idx);
                checkbox.parentElement.className = "flex items-start p-3 border rounded-md cursor-pointer transition bg-emerald-100 border-emerald-400 font-medium text-emerald-900";
            } else {
                if (index > -1) goals.splice(index, 1);
                checkbox.parentElement.className = "flex items-start p-3 border rounded-md cursor-pointer transition hover:bg-slate-50 border-slate-200 text-slate-700 font-medium";
            }
        }

        function selectAllListedGoals() {
            const newSelections = {};
            Object.keys(appState.evaluations).forEach(course => {
                const courseEvals = appState.evaluations[course];
                const hayirIndices = Object.keys(courseEvals).filter(idx => courseEvals[idx] === "Hayır").map(Number);
                if(hayirIndices.length > 0) {
                    newSelections[course] = hayirIndices;
                }
            });
            appState.selectedBEPGoals = newSelections;
            renderApp();
        }

        function handleGoalSelectionSubmit() {
            let selectedAny = false;
            Object.values(appState.selectedBEPGoals).forEach(arr => { if (arr.length > 0) selectedAny = true; });
            
            if (!selectedAny) { alert('Lütfen bu yılın BEP programına eklenecek en az bir amaç seçin.'); return; }

            const bepAreas = [];
            const isPreschool = appState.currentStudent.level === "Ana Sınıfı";
            const db = isPreschool ? PRESCHOOL_DATABASE : PRIMARY_DATABASE;

            Object.keys(appState.selectedBEPGoals).forEach(course => {
                const selectedIndices = appState.selectedBEPGoals[course];
                if (selectedIndices.length === 0) return;

                const courseData = db[course] || { uda: "Genel Beceriler", kdaList: [], methods: "", materials: "" };
                const selectedKdas = selectedIndices.map(idx => courseData.kdaList[idx]);
                const dates = distributeDates(selectedKdas.length);
                const kdaWithDates = selectedKdas.map((kdaStr, index) => ({
                    description: kdaStr, startDate: dates[index].start, endDate: dates[index].end
                }));

                let materialsStr = courseData.materials || "Ders materyalleri";
                if (ACADEMIC_COURSES.includes(course) && !materialsStr.toLowerCase().includes("ders kitabı")) {
                    materialsStr = "Ders kitabı, " + materialsStr;
                }

                bepAreas.push({
                    area: course, uda: courseData.uda, methods: courseData.methods || "Doğrudan Öğretim",
                    materials: materialsStr, kdaList: kdaWithDates
                });
            });

            const isExisting = appState.currentStudent.id !== null;
            const studentToSave = {
                ...appState.currentStudent, 
                id: isExisting ? appState.currentStudent.id : Date.now(),
                bep: bepAreas, 
                evaluations: JSON.parse(JSON.stringify(appState.evaluations)), // Değerlendirmeleri sakla
                createdAt: isExisting ? appState.currentStudent.createdAt : new Date().toLocaleDateString('tr-TR')
            };

            if (isExisting) { 
                const idx = appState.students.findIndex(s => s.id === studentToSave.id);
                if (idx > -1) appState.students[idx] = studentToSave;
            } else { appState.students.push(studentToSave); }

            appState.generatedBEP = studentToSave;
            setView('bepView');
        }

        function editStudent(id) {
            appState.formError = '';
            const std = appState.students.find(s => s.id === id);
            if (std) {
                appState.currentStudent = JSON.parse(JSON.stringify(std));
                appState.evaluations = JSON.parse(JSON.stringify(std.evaluations || {}));
                setView('addStudent');
            }
        }

        function deleteStudent(id) {
            if(window.confirm('Bu öğrenciyi ve BEP kaydını silmek istediğinize emin misiniz?')) {
                appState.students = appState.students.filter(s => s.id !== id);
                renderApp();
            }
        }

            appState.formError = '';

            appState.evaluations = {};

            <div class="min-h-screen bg-slate-100 p-6 py-10 print:bg-white print:p-0">
              <div class="max-w-5xl mx-auto mb-4 flex justify-between items-center hide-on-print bg-white p-4 rounded-lg shadow-sm">
                <button onclick="setView('selectCourses')" class="text-blue-600 font-bold">Geri Dön</button>
                <div class="flex gap-2">
                  <button onclick="window.print()" class="bg-slate-700 text-white px-4 py-2 rounded">Yazdır / PDF</button>
                  <button onclick="handleAssessmentSubmit()" class="bg-indigo-600 text-white px-4 py-2 rounded">BEP Amaçlarını Seç</button>
                </div>
              </div>
              <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-8 print:p-0 print:shadow-none print-container">${coursesHtml}</div>
            </div>`;
        }

        function renderGoalSelection() {
            let html = '';
            const isPreschool = appState.currentStudent.level === "Ana Sınıfı";
            const db = isPreschool ? PRESCHOOL_DATABASE : PRIMARY_DATABASE;

            Object.keys(appState.evaluations).forEach(course => {
                const evals = appState.evaluations[course];
                const hIndices = Object.keys(evals).filter(idx => evals[idx] === "Hayır").map(Number);
                if (hIndices.length === 0) return;
                const data = db[course] || { kdaList: [] };

                html += `
                <div class="border rounded-lg mb-6 overflow-hidden">
                  <div class="bg-emerald-50 p-3 font-bold">${course} - BEP'e Alınacakları Seçin</div>
                  <div class="p-4 space-y-2">
                    ${hIndices.map(idx => `
                      <label class="flex items-start p-2 border rounded hover:bg-slate-50 cursor-pointer">
                        <input type="checkbox" class="mt-1 mr-3" onchange="toggleBEPGoal('${course}', ${idx}, this)" />
                        <span>${data.kdaList[idx]}</span>
                      </label>`).join('')}
                  </div>
                </div>`;
            });

            return `
            <div class="min-h-screen bg-slate-100 p-6 py-10">
              <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
                <div class="flex justify-between items-center mb-6">
                  <h2 class="text-xl font-bold">Aşama 4: BEP Amaçlarını Onayla</h2>
                  <button onclick="selectAllListedGoals()" class="bg-emerald-100 text-emerald-800 px-3 py-1 rounded text-sm font-bold">Tümünü Seç</button>
                </div>
                ${html || '<p class="text-center p-10 text-slate-400">BEP\'e alınacak beceri bulunamadı (Tüm değerlendirmeler Evet işaretlenmiş).</p>'}
                <div class="mt-8 flex justify-between border-t pt-6">
                  <button onclick="setView('assessment')" class="text-slate-500">Geri Dön</button>
                  <button onclick="handleGoalSelectionSubmit()" class="bg-emerald-600 text-white px-8 py-3 rounded-lg font-bold">BEP Dosyasını Oluştur</button>
                </div>
              </div>
            </div>`;
        }

        // ==========================================
        // 6. ÖBÖA VE DEĞERLENDİRME FORMLARI MANTIĞI
        // ==========================================

        function buildEvaluationFormsHtml(studentData) {
            const teacher = `${appState.currentUser.firstName} ${appState.currentUser.lastName}`;

            const forms = studentData.bep.map(area => {
                const rows = area.kdaList.map(kda => `
                    <tr>
                      <td class="text-sm">${kda.description}</td>
                      <td class="text-center text-xs">3/4 (%80)</td>
                      <td class="text-center border-l-2"></td><td class="text-center"></td><td class="text-center"></td><td class="text-center"></td><td class="text-center border-r-2"></td>
                    </tr>`).join('');

                return `
                <div class="no-break mb-12">
                  <div class="text-center mb-4 border-b-2 border-black pb-2">
                    <h2 class="text-lg font-bold">${area.area.toUpperCase()} ÖLÇÜT BAĞIMLI ÖLÇÜ ARACI</h2>
                  </div>
                  
                  <div class="grid grid-cols-2 gap-4 text-xs mb-4">
                    <div><strong>Öğrenci:</strong> ${studentData.firstName} ${studentData.lastName}</div>
                    <div><strong>Uygulayıcı:</strong> ${teacher}</div>
                  </div>

                  <p class="bg-slate-100 p-2 text-xs font-bold mb-1">UDA: ${area.uda}</p>
                  
                  <table>
                    <thead>
                      <tr>
                        <th rowspan="2" class="text-left">Kısa Dönemli Amaçlar (KDA) / Alt Basamaklar</th>
                        <th rowspan="2" class="w-16 text-center">Ölçüt</th>
                        <th colspan="5" class="text-center">Değerlendirme Tarihleri</th>
                      </tr>
                      <tr>
                        <th class="w-20 text-center text-[8px]">.../.../20...</th>
                        <th class="w-20 text-center text-[8px]">.../.../20...</th>
                        <th class="w-20 text-center text-[8px]">.../.../20...</th>
                        <th class="w-20 text-center text-[8px]">.../.../20...</th>
                        <th class="w-20 text-center text-[8px]">.../.../20...</th>
                      </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                  </table>
                  
                  <div class="mt-2 text-[10px] italic text-slate-600">
                    * Kısaltmalar: B (Bağımsız), Sİ (Sözel İpucu), MY (Model Olma), FY (Fiziksel Yardım)
                  </div>
                </div>`;
            }).join('');

            return `
            <div class="w-full bg-white mx-auto print-container">
              <div class="text-center mb-10 hide-on-print">
                <span class="bg-indigo-100 text-indigo-800 px-4 py-1 rounded-full text-sm font-bold">Öğrenci İzleme ve Değerlendirme Formları</span>
              </div>
              ${forms}
            </div>`;
        }

        function buildSingleBEPHtml(studentData, type) {
            const { startDate, endDate } = getSchoolDates();
            const veli = studentData.guardian === "Anne" ? studentData.motherName : studentData.fatherName;
            const isDestek = type === "DESTEK";
            const bepList = isDestek ? studentData.bep.filter(a => studentData.supportRoomCourses.includes(a.area)) : studentData.bep;

            const teacher = `${appState.currentUser.firstName} ${appState.currentUser.lastName} (${appState.currentUser.branch})`;

            return `
            <div class="w-full bg-white mx-auto print-container print:p-0">
              <div class="text-center mb-6 border-b-2 border-black pb-4">
                <h1 class="text-lg font-bold">${isDestek ? "DESTEK EĞİTİM ODASI " : ""}BİREYSELLEŞTİRİLMİŞ EĞİTİM PROGRAMI (BEP) DOSYASI</h1>
              </div>

              <h2 class="font-bold bg-slate-200 p-1 mb-2">Öğrenci Bilgileri</h2>
              <table>
                <tbody>
                  <tr><td class="w-1/3 font-bold">Adı-Soyadı</td><td class="w-2/3">${studentData.firstName} ${studentData.lastName}</td></tr>
                  <tr><td class="font-bold">Tanı / Karar</td><td>${studentData.disability} / ${studentData.decision}</td></tr>
                  <tr><td class="font-bold">Eğitim Ortamı Düzenlemeleri</td><td>${studentData.environmentMods || "-"}</td></tr>
                  <tr><td class="font-bold">BEP Dönemi</td><td>${startDate.toLocaleDateString('tr-TR')} - ${endDate.toLocaleDateString('tr-TR')}</td></tr>
                </tbody>
              </table>

              <h2 class="font-bold bg-slate-200 p-1 mb-2 mt-4 print-break">BİREYSELLEŞTİRİLMİŞ EĞİTİM PLANI (KAZANIMLAR)</h2>
              ${bepList.map(area => `
                <div class="no-break mb-8">
                  <div class="bg-slate-800 text-white p-2 font-bold mb-1">${area.area.toUpperCase()}</div>
                  <table>
                    <thead>
                      <tr>
                        <th class="w-[20%]">UDA</th><th class="w-[25%]">KDA</th><th class="w-[10%]">Ölçüt</th><th class="w-[15%]">Yöntem/Teknik</th><th class="w-[15%]">Materyaller</th><th class="w-[15%]">Tarih</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${area.kdaList.map((kda, kIdx) => `
                        <tr>
                          ${kIdx===0?`<td rowspan="${area.kdaList.length}">${area.uda}</td>`:''}
                          <td>${kda.description}</td>
                          <td class="text-center">%80</td>
                          ${kIdx===0?`<td rowspan="${area.kdaList.length}">${area.methods}</td><td rowspan="${area.kdaList.length}">${area.materials}</td>`:''}
                          <td class="text-center text-[10px]">${kda.startDate}<br/>${kda.endDate}</td>
                        </tr>`).join('')}
                    </tbody>
                  </table>
                </div>`).join('')}

              <div class="print-break mt-4">
                 <h2 class="font-bold bg-slate-200 p-1 mb-2">BEP Geliştirme Birim Kararları</h2>
                 <table>
                   <thead><tr><th>Hizmet Türü</th><th>Ders</th><th>Haftalık Süre</th><th>Sorumlu</th></tr></thead>
                   <tbody>
                     ${studentData.usesSupportRoom === "Evet" ? `<tr><td>Destek Eğitim</td><td>${studentData.supportRoomCourses.join(", ")}</td><td>${studentData.supportRoomHours} Saat</td><td>${studentData.supportRoomTeacher || "-"}</td></tr>` : '<tr><td colspan="4" class="text-center">Planlanmamıştır.</td></tr>'}
                   </tbody>
                 </table>
                 <p class="text-sm"><strong>Aile Bilgilendirme:</strong> ${studentData.familyInfoFrequency} / ${studentData.familyInfoMethod} / Eğitim: ${studentData.familyEducation}</p>
                 <div class="text-center mt-12">
                    <h3 class="font-bold">İMZALAR</h3>
                    <div class="grid grid-cols-3 gap-8 mt-10 text-xs">
                      <div>Müdür Yard.<br/>(Başkan)</div><div>Öğrenci Velisi<br/>(${veli})</div><div>Sınıf Öğretmeni<br/>(${teacher})</div>
                    </div>
                 </div>
              </div>
            </div>`;
        }

        function renderBEP() {
            const std = appState.generatedBEP;
            if (!std) return '';
            let destek = (std.usesSupportRoom === "Evet" && std.supportRoomCourses.length > 0) ? `<div class="print-break mt-10 pt-10 border-t-4 border-dashed border-slate-300">${buildSingleBEPHtml(std, "DESTEK")}</div>` : '';

            return `
            <div class="min-h-screen bg-slate-200 p-8 print:p-0 print:bg-white flex flex-col items-center text-[12px]">
              <div class="w-full max-w-[210mm] mb-4 flex justify-between hide-on-print bg-white p-4 rounded-lg shadow-sm">
                <button onclick="setView('dashboard')" class="text-blue-600 font-bold flex items-center"><i data-lucide="arrow-left" class="mr-1 w-4 h-4"></i> Panele Dön</button>
                <div class="flex gap-2">
                  <button onclick="setView('evalFormsView')" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded font-bold hover:bg-indigo-200">Değerlendirme Formları</button>
                  <button onclick="exportHTMLToWord('bep-wrapper')" class="bg-blue-800 text-white px-4 py-2 rounded">Word'e Aktar</button>
                  <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded">Yazdır / PDF Al</button>
                </div>
              </div>
              <div id="bep-wrapper" class="w-full print:p-0">${buildSingleBEPHtml(std, "ANA")}${destek}</div>
            </div>`;
        }

        function renderEvalForms() {
            const std = appState.generatedBEP;
            if (!std) return '';

            return `
            <div class="min-h-screen bg-slate-200 p-8 print:p-0 print:bg-white flex flex-col items-center text-[12px]">
              <div class="w-full max-w-[210mm] mb-4 flex justify-between hide-on-print bg-white p-4 rounded-lg shadow-sm">
                <button onclick="setView('bepView')" class="text-blue-600 font-bold flex items-center"><i data-lucide="arrow-left" class="mr-1 w-4 h-4"></i> BEP'e Dön</button>
                <div class="flex gap-2">
                  <button onclick="exportHTMLToWord('eval-wrapper', 'Degerlendirme_Formlari.doc')" class="bg-blue-800 text-white px-4 py-2 rounded">Word'e Aktar</button>
                  <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded">Yazdır / PDF Al</button>
                </div>
              </div>
              <div id="eval-wrapper" class="w-full print:p-0">${buildEvaluationFormsHtml(std)}</div>
            </div>`;
        }

        function renderApp() {
            const root = document.getElementById('root');
            switch(appState.view) {
                case 'auth': root.innerHTML = renderAuth(); break;
                case 'dashboard': root.innerHTML = renderDashboard(); break;
                case 'profile': root.innerHTML = renderProfile(); break;
                case 'addStudent': root.innerHTML = renderAddStudent(); break;
                case 'selectCourses': root.innerHTML = renderSelectCourses(); break;
                case 'assessment': root.innerHTML = renderAssessment(); break;
                case 'selectGoals': root.innerHTML = renderGoalSelection(); break;
                case 'bepView': root.innerHTML = renderBEP(); break;
                case 'evalFormsView': root.innerHTML = renderEvalForms(); break;
            }
            lucide.createIcons();
        }

        window.onload = renderApp;
    </script>
</body>
</html>
